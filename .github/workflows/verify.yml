name: Verify

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ github.job }}-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ runner.os }}-

      - name: Lint, format:check, typecheck (same as .husky/pre-push)
        run: npx turbo run lint format:check typecheck
