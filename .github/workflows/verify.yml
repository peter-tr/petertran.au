name: Verify

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # changeset-check.yml auto-commits a .changeset/*.md file and pushes it
    # straight to the PR branch, which fires its own `synchronize` event -
    # without this, that second event re-ran the full lint/format/typecheck/
    # test suite plus the Playwright visual-e2e job (Chromium install
    # included) a second time, ~15s later, against a diff that only ever
    # added one changeset file. Confirmed against the run history: roughly
    # half of all Verify runs were this exact back-to-back duplicate.
    paths-ignore:
      - ".changeset/**"

permissions:
  contents: read

jobs:
  # Skipped on the Changesets release PR (branch changeset-release/main,
  # created/updated by changesets.yml) - it only ever contains consumed
  # .changeset/*.md files, CHANGELOG.md entries, and package.json version
  # bumps, never hand-written source, so there's nothing here for lint/
  # format/typecheck/test/e2e to catch. It's also resynchronized on every
  # new changeset merged to main, so skipping saves real CI time.
  verify:
    if: github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ github.job }}-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ runner.os }}-

      - name: Lint, format:check, typecheck, test (same as .husky/pre-push)
        run: npx turbo run lint format:check typecheck test

  visual-e2e:
    if: github.head_ref != 'changeset-release/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Needed before the app can boot - web/src/*/lib/api.ts imports real
      # (non-type-only) values like generated enums from *.generated.ts,
      # which don't exist until codegen has run (same reason validate-schema,
      # in build-and-deploy.yml, runs it before importing those modules).
      - name: Generate GraphQL types
        run: npx turbo run codegen

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('web/package-lock.json', 'package-lock.json') }}

      # EXPERIMENT: dropping --with-deps to test whether ubuntu-latest
      # already has Chromium's required shared libs preinstalled (it ships
      # Google Chrome, which needs mostly the same ones) - --with-deps'
      # apt-get step costs ~39s on every run regardless of the browser
      # binary cache above. Will revert if this breaks.
      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install chromium

      # Boots each project's real dev server (same in-memory mock used for
      # local `npm run dev`) plus the Vite dev server, and takes visual
      # snapshots of the portfolio home, pantry, and imposter setup pages at
      # both a desktop and a mobile (Pixel 7 viewport, still Chromium - no
      # second browser to install) size - deterministic since the mock
      # resolvers return fixed fixture data, no live AWS/production
      # dependency.
      - name: Run Playwright visual smoke tests
        working-directory: web
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
