name: Destroy Test Env

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::275695104296:role/petertran-au-github-actions-deploy
          aws-region: ap-southeast-2

      # DEPLOY_TEST_ENV=true so infra/bin/app.ts registers the test stacks at
      # all - cdk destroy can't target a stack that isn't in the synthesized
      # app. Tears down both stacks (3 test Lambdas, 3 test tables, the test
      # HttpApi, the test S3 bucket + CloudFront distribution, both certs) -
      # nothing else to clean up, RemovalPolicy.DESTROY + autoDeleteObjects
      # handle the tables/bucket.
      - name: Destroy test environment stacks
        working-directory: infra
        env:
          DEPLOY_TEST_ENV: "true"
        run: npx cdk destroy PetertranTestEnvStack PetertranTestCertStack --force
