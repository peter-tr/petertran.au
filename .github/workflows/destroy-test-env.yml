name: Destroy Test Env

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::275695104296:role/petertran-au-github-actions-deploy
          aws-region: ap-southeast-2

      # `cdk destroy` still synths the app first (to know what's in it), and
      # SiteStack/PantryStack/GamesStack/SupergraphStack's Lambdas all point
      # lambda.Code.fromAsset at their own dist/ - without building those
      # first, synth fails with CannotFindAsset before destroy ever runs.
      # web isn't built - nothing here needs web/dist.
      - name: Build (api - via turbo, cached)
        run: |
          npx turbo run codegen
          npx turbo run build --filter=!web

      # DEPLOY_TEST_ENV=true so infra/bin/app.ts registers the test stacks at
      # all - cdk destroy can't target a stack that isn't in the synthesized
      # app. Tears down all 6 (4 test Lambdas, 3 test tables, the test
      # HttpApi + its own cert, the test S3 bucket + CloudFront distribution
      # + its own cert) - nothing else to clean up, RemovalPolicy.DESTROY +
      # autoDeleteObjects handle the tables/bucket. PantryStack/GamesStack/
      # SupergraphStack/ApiGatewayStack don't reference each other's or
      # SiteStack's CloudFormation outputs (see api-gateway-stack.ts's doc
      # comment on why), but SiteStack does depend on CertStack's live
      # certificate reference, same as prod - cdk destroy resolves that real
      # dependency itself regardless of the order listed here.
      - name: Destroy test environment stacks
        working-directory: infra
        env:
          DEPLOY_TEST_ENV: "true"
        run: >
          npx cdk destroy PetertranTestApiGatewayStack PetertranTestSupergraphStack PetertranTestGamesStack
          PetertranTestPantryStack PetertranTestSiteStack PetertranTestCertStack --force
