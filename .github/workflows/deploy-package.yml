name: Deploy Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: >-
          Package version tag to redeploy, e.g. pantry@1.4.0. One of pantry,
          imposter, portfolio, web, supergraph, design-studio. See the repo's
          Releases page or `git tag -l '*@*'` for available values.
        required: true
        type: string
      allow-replacements:
        description: >-
          Allow the deploy to proceed even if it would replace (destroy +
          recreate) a stateful resource - e.g. this tag's stack definition
          predates a later infra change. Leave off unless you've checked the
          cdk diff yourself and the replacement is intended.
        required: false
        type: boolean
        default: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      stacks: ${{ steps.map.outputs.stacks }}
      sync-web: ${{ steps.map.outputs.sync-web }}
    steps:
      - id: map
        env:
          TAG: ${{ inputs.tag }}
        run: |
          PACKAGE="${TAG%@*}"
          case "$PACKAGE" in
            pantry)
              echo "stacks=PetertranPantryStack" >> "$GITHUB_OUTPUT"
              echo "sync-web=false" >> "$GITHUB_OUTPUT"
              ;;
            imposter)
              echo "stacks=PetertranGamesStack" >> "$GITHUB_OUTPUT"
              echo "sync-web=false" >> "$GITHUB_OUTPUT"
              ;;
            portfolio)
              # Portfolio's Lambda lives in the same stack as web hosting
              # (infra/lib/site-stack.ts), but redeploying it doesn't need a
              # web asset sync.
              echo "stacks=PetertranSiteStack" >> "$GITHUB_OUTPUT"
              echo "sync-web=false" >> "$GITHUB_OUTPUT"
              ;;
            web)
              echo "stacks=PetertranSiteStack" >> "$GITHUB_OUTPUT"
              echo "sync-web=true" >> "$GITHUB_OUTPUT"
              ;;
            supergraph)
              echo "stacks=PetertranSupergraphStack" >> "$GITHUB_OUTPUT"
              echo "sync-web=false" >> "$GITHUB_OUTPUT"
              ;;
            design-studio)
              echo "stacks=PetertranDesignStudioStack" >> "$GITHUB_OUTPUT"
              echo "sync-web=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unknown package '$PACKAGE' in tag '$TAG' - expected one of pantry, imposter, portfolio, web, supergraph, design-studio." >&2
              exit 1
              ;;
          esac

  build-and-deploy:
    needs: resolve
    uses: ./.github/workflows/build-and-deploy.yml
    with:
      ref: ${{ inputs.tag }}
      stacks: ${{ needs.resolve.outputs.stacks }}
      sync-web: ${{ needs.resolve.outputs.sync-web == 'true' }}
      allow-replacements: ${{ inputs.allow-replacements }}
    permissions:
      id-token: write
      contents: read
