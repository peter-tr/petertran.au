name: Deploy Test Env

on:
  workflow_dispatch:
    inputs:
      ref:
        description: >-
          Git branch, tag, or commit SHA to deploy - e.g. "main" or a feature
          branch name. NOT a URL: this always deploys to the on-demand test
          environment (test.petertran.au / api.test.petertran.au), separate
          from prod, for testing big changes (e.g. Apollo Router/Federation)
          safely - the domain names above describe where it lands, not what
          to type here.
        required: true
        type: string
        default: main

jobs:
  build-and-deploy:
    uses: ./.github/workflows/build-and-deploy.yml
    with:
      ref: ${{ inputs.ref }}
      # Space-separated, not comma-separated - cdk's CLI takes each stack name
      # as its own positional argument, so a comma-joined string gets treated
      # as one (nonexistent) literal stack name.
      stacks: "PetertranTestCertStack PetertranTestEnvStack"
      sync-web: true
      deploy-test-env: true
      # The test stacks are disposable and have no prior deployed state to
      # diverge from on a first deploy - the destructive-replacement check
      # exists for rollbacks of stateful prod resources, not this.
      allow-replacements: true
    permissions:
      id-token: write
      contents: read

  print-urls:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::275695104296:role/petertran-au-github-actions-deploy
          aws-region: ap-southeast-2

      # First-ever deploy takes noticeably longer than later ones (ACM DNS
      # validation + CloudFront distribution creation) - same one-time cost
      # as any first CertStack/SiteStack deploy.
      - name: Print test environment URLs
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name PetertranTestEnvStack \
            --query "Stacks[0].Outputs[?OutputKey=='TestApiBaseUrl'].OutputValue" --output text)
          WEB_URL=$(aws cloudformation describe-stacks --stack-name PetertranTestEnvStack \
            --query "Stacks[0].Outputs[?OutputKey=='TestSiteBaseUrl'].OutputValue" --output text)
          echo "Web:  $WEB_URL"
          echo "API:  $API_URL"
          echo "### Test environment deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Web: $WEB_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- API: $API_URL" >> "$GITHUB_STEP_SUMMARY"
