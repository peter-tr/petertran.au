name: Deploy Test Env
# Default run-name is just "Deploy Test Env #N: Manually run by @actor" -
# doesn't say what ref actually got deployed, so a run list is useless for
# telling deploys of different branches apart at a glance.
run-name: "Deploy Test Env: ${{ inputs.ref }} (@${{ github.actor }})"

on:
  workflow_dispatch:
    inputs:
      ref:
        description: >-
          Git branch, tag, or commit SHA to deploy - e.g. "main" or a feature
          branch name. NOT a URL: this always deploys to the on-demand test
          environment (test.petertran.au / api.test.petertran.au), separate
          from prod, for testing big changes (e.g. Apollo Router/Federation)
          safely - the domain names above describe where it lands, not what
          to type here.
        required: true
        type: string
        default: main

jobs:
  build-and-deploy:
    uses: ./.github/workflows/build-and-deploy.yml
    with:
      ref: ${{ inputs.ref }}
      # Space-separated, not comma-separated - cdk's CLI takes each stack name
      # as its own positional argument, so a comma-joined string gets treated
      # as one (nonexistent) literal stack name. Same 5 stack "shapes" as
      # prod (infra/bin/app.ts reuses CertStack/SiteStack/PantryStack/
      # GamesStack/ApiGatewayStack directly), just the test-specific
      # instantiation of each.
      stacks: "PetertranTestCertStack PetertranTestSiteStack PetertranTestPantryStack PetertranTestGamesStack PetertranTestApiGatewayStack"
      sync-web: true
      deploy-test-env: true
      # The test stacks are disposable and have no prior deployed state to
      # diverge from on a first deploy - the destructive-replacement check
      # exists for rollbacks of stateful prod resources, not this.
      allow-replacements: true
    permissions:
      id-token: write
      contents: read

  print-urls:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      # Fixed, well-known domains (infra/bin/app.ts always deploys the test
      # env to these) - no need to query CloudFormation outputs for values
      # that never change, and this way it prints even on a fresh account
      # with nothing deployed yet.
      - name: Print test environment URLs
        run: |
          echo "Web:  https://test.petertran.au"
          echo "API:  https://api.test.petertran.au"
          echo "### Test environment deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Web: https://test.petertran.au" >> "$GITHUB_STEP_SUMMARY"
          echo "- API: https://api.test.petertran.au" >> "$GITHUB_STEP_SUMMARY"
