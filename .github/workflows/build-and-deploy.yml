name: Build and Deploy

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref (SHA, tag, or branch) to check out and deploy
        required: true
        type: string
      stacks:
        description: CDK stack name(s) to deploy. Empty deploys every stack (--all).
        required: false
        type: string
        default: ""
      sync-web:
        description: Whether to sync web/dist to S3 and invalidate CloudFront
        required: false
        type: boolean
        default: true
      allow-replacements:
        description: >-
          Allow deploying even if CDK would replace (destroy + recreate) a
          stateful resource. Defaults to false - safe for rollbacks, where an
          old ref's stack definition unexpectedly differing from what's live
          is a surprise, not an intent. The normal push-to-main deploy opts
          back in, since a forward push's changes are already the intent.
        required: false
        type: boolean
        default: false
      deploy-test-env:
        description: >-
          Deploy the on-demand test environment (PetertranTestCertStack /
          PetertranTestSiteStack / PetertranTestPantryStack /
          PetertranTestGamesStack / PetertranTestApiGatewayStack,
          test.petertran.au / api.test.petertran.au) instead of prod. Sets
          DEPLOY_TEST_ENV=true so infra/bin/app.ts registers those stacks -
          they're otherwise invisible to `cdk deploy --all` - and builds
          web/ against web/.env.test instead of web/.env.production.
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  validate-schema:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ github.job }}-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ runner.os }}-

      - name: Validate frontend queries against each schema (graphql-codegen)
        run: npx turbo run codegen

      # Must run after codegen, not before - it require()s each service's
      # real frontend module (web/src/*/api.ts etc.) to validate their query
      # strings, and those modules import real (non-type-only) values like
      # generated enums from *.generated.ts, which don't exist until codegen
      # has run. Passed locally the first time only because those gitignored
      # files were already sitting on disk from a previous local run - a
      # fresh CI checkout has neither.
      - name: Validate GraphQL schemas and Anthropic structured-output schemas
        run: npm run validate-schemas --workspace=api

      - name: Lint
        run: npx turbo run lint

  e2e-smoke:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Boot each service's dev server and smoke-test it
        run: npm run test:e2e --workspace=api

  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: turbo-${{ github.job }}-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.job }}-${{ runner.os }}-

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::275695104296:role/petertran-au-github-actions-deploy
          aws-region: ap-southeast-2

      - name: Build (api, web, infra - via turbo, cached and parallelized)
        run: |
          if [ "${{ inputs.deploy-test-env }}" = "true" ]; then
            # turbo's own `build` task depends on `codegen` (see turbo.json),
            # but excluding web from that `build` run also excludes it from
            # codegen - so codegen has to run explicitly first, or web's
            # build:test fails on missing *.generated.ts files.
            npx turbo run codegen
            npx turbo run build --filter=!web
            npm run build:test --workspace=web
          else
            npm run build
          fi

      # cdk diff annotates every property change that CloudFormation can't
      # apply in place with "(requires replacement)" or, when it's only
      # conditional on other factors, "(may cause replacement)" (confirmed
      # against node_modules/aws-cdk/lib/index.js's diff formatter - these
      # are the same two phrases `cdk deploy` would silently act on). A
      # replacement means the old physical resource gets deleted, not
      # updated - fatal for anything stateful with removalPolicy: DESTROY
      # (no snapshot/undo). Caught the hard way: rolling back pantry to an
      # old tag whose stack predated an explicit-resource-naming change
      # replaced (and destroyed, unrecoverably - no backups, no PITR)
      # the live DynamoDB table.
      - name: Check for destructive resource replacements
        if: ${{ !inputs.allow-replacements }}
        working-directory: infra
        env:
          DEPLOY_TEST_ENV: ${{ inputs.deploy-test-env }}
        run: |
          set -o pipefail
          npx cdk diff ${{ inputs.stacks != '' && inputs.stacks || '--all' }} 2>&1 | tee /tmp/cdk-diff.txt || true
          if grep -qE "requires replacement|may cause replacement" /tmp/cdk-diff.txt; then
            echo "::error::This ref's infra would replace (destroy + recreate) one or more stateful resources - see the diff above for exactly which property. Re-run with allow-replacements: true only if this is genuinely intended."
            exit 1
          fi

      - name: Deploy infrastructure
        working-directory: infra
        env:
          DEPLOY_TEST_ENV: ${{ inputs.deploy-test-env }}
        run: npx cdk deploy ${{ inputs.stacks != '' && inputs.stacks || '--all' }} --concurrency 4 --require-approval never

      # Must run after "Deploy infrastructure", not chained into the build
      # step above - it fetches live data from VITE_GRAPHQL_ENDPOINT, and
      # whenever that endpoint's route is new (e.g. api.petertran.au/graphql
      # the first time the supergraph gateway went to prod), it doesn't
      # exist until this deploy step creates it. Running it as part of
      # `npm run build`, before infra deploy, 404s and aborts the job before
      # `cdk deploy` ever runs.
      - name: Prerender web
        if: inputs.sync-web
        working-directory: web
        run: |
          if [ "${{ inputs.deploy-test-env }}" = "true" ]; then
            PRERENDER_ENV_FILE=.env.test npm run prerender
          else
            npm run prerender
          fi

      - name: Sync frontend to S3
        if: inputs.sync-web
        env:
          SITE_STACK_NAME: ${{ inputs.deploy-test-env && 'PetertranTestSiteStack' || 'PetertranSiteStack' }}
        run: |
          BUCKET=$(aws cloudformation describe-stacks --stack-name "$SITE_STACK_NAME" --region ap-southeast-2 \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" --output text)
          aws s3 sync web/dist "s3://$BUCKET" --delete
          # The prerendered /resume route has no file extension (so CloudFront's
          # exact-key lookup matches the URL path with no rewriting), so S3 can't
          # content-type-sniff it from sync alone - it'd otherwise default to
          # binary/octet-stream and browsers would download it instead of
          # rendering it.
          aws s3 cp web/dist/resume "s3://$BUCKET/resume" --content-type text/html

      - name: Invalidate CloudFront cache
        if: inputs.sync-web
        env:
          SITE_STACK_NAME: ${{ inputs.deploy-test-env && 'PetertranTestSiteStack' || 'PetertranSiteStack' }}
        run: |
          DIST_ID=$(aws cloudformation describe-stacks --stack-name "$SITE_STACK_NAME" --region ap-southeast-2 \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" --output text)
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
