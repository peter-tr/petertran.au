name: Changelog

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # `publish: npx changeset tag` never touches npm - these are private,
      # internally-deployed apps, not published packages. It only runs once
      # a Version Packages PR has been merged (no pending changesets left),
      # and just tags each bumped package as `<name>@<version>` and pushes
      # the tag. createGithubReleases (default true) then creates a matching
      # GitHub Release per tag from that package's CHANGELOG.md entry.
      #
      # GITHUB_TOKEN here is CHANGESET_PAT, not the default token: this
      # action uses whatever token it's given for both its git push (the
      # version-bump commit) and its PR create/update API call - with the
      # default GITHUB_TOKEN, the resulting pull_request run lands in an
      # approval-required state (same issue changeset-check.yml's checkout
      # hit), permanently stuck needing a manual "approve and run" on the
      # Version Packages PR every time it updates.
      - name: Create Version Packages PR / tag releases
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npx changeset tag
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESET_PAT }}
