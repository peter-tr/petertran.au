name: Changelog

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      # Token here is CHANGESET_PAT, not the default: changesets/action uses
      # `commitMode: git-cli` (its default), meaning its actual `git push`
      # shells out and reuses whatever credential THIS checkout configured -
      # its own `env: GITHUB_TOKEN` (set below) only covers its Octokit API
      # calls (creating/updating the PR itself), not the underlying push.
      # Confirmed the hard way: setting only the action's env still left the
      # push attributed to github-actions[bot], landing every Version
      # Packages PR update in GitHub's approval-required state for
      # GITHUB_TOKEN-authored pull_request runs.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CHANGESET_PAT }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # `publish: npx changeset tag` never touches npm - these are private,
      # internally-deployed apps, not published packages. It only runs once
      # a Version Packages PR has been merged (no pending changesets left),
      # and just tags each bumped package as `<name>@<version>` and pushes
      # the tag. createGithubReleases (default true) then creates a matching
      # GitHub Release per tag from that package's CHANGELOG.md entry.
      - name: Create Version Packages PR / tag releases
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npx changeset tag
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESET_PAT }}
