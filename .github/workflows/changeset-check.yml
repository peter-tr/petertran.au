name: Changeset Coverage

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  changeset-coverage:
    runs-on: ubuntu-latest
    steps:
      # Checked out with a PAT (CHANGESET_PAT), not the default GITHUB_TOKEN:
      # a pull_request run whose triggering commit was authored via
      # GITHUB_TOKEN always lands in an approval-required state (GitHub's
      # anti-self-approval safeguard for required status checks), which
      # would make every auto-generated changeset need a manual "approve
      # and run" click. Pushing as a real account sidesteps that entirely.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CHANGESET_PAT }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      # Auto-generates .changeset/auto-*.md from the PR title (already
      # enforced as Conventional Commits) + touched packages, when no
      # changeset exists yet - commits it back onto this PR's branch so the
      # common case needs no manual `npm run changeset` step. Pushing here
      # re-triggers this workflow via `synchronize`; the second run just
      # sees a changeset already present and no-ops, so it's self-limiting.
      - name: Auto-generate a changeset from the PR title, if none exists
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          node scripts/generate-changeset.mjs
          if [ -n "$(git status --porcelain .changeset)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .changeset
            git commit -m "chore: auto-generate changeset"
            git push
          fi

      - name: Check every touched package has a changeset
        run: node scripts/check-changeset-coverage.mjs
