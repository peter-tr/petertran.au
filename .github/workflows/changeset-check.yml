name: Changeset Coverage

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  changeset-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check every touched package has a changeset
        run: node scripts/check-changeset-coverage.mjs
