name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    # See verify.yml's paths-ignore comment - skips the redundant re-run
    # triggered by changeset-check.yml's auto-commit, which never changes
    # the PR title this workflow lints anyway.
    paths-ignore:
      - ".changeset/**"

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
