name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::275695104296:role/petertran-au-github-actions-deploy
          aws-region: ap-southeast-2

      - name: Build API
        run: npm run build --workspace=api

      - name: Build frontend
        run: npm run build --workspace=web

      - name: Deploy infrastructure
        working-directory: infra
        run: npx cdk deploy --all --concurrency 4 --require-approval never

      - name: Sync frontend to S3
        run: |
          BUCKET=$(aws cloudformation describe-stacks --stack-name PetertranSiteStack --region ap-southeast-2 \
            --query "Stacks[0].Outputs[?OutputKey=='BucketName'].OutputValue" --output text)
          aws s3 sync web/dist "s3://$BUCKET" --delete

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws cloudformation describe-stacks --stack-name PetertranSiteStack --region ap-southeast-2 \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" --output text)
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
