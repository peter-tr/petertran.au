name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write

# Two merges landing close together would otherwise run two overlapping
# `cdk deploy`s against the same stacks - cancel the older run so only the
# latest commit's deploy proceeds. If cancellation lands mid-`cdk deploy`,
# CloudFormation's own stack update keeps running server-side regardless
# (killing the job just stops polling it) - a deploy that starts before that
# update settles fails with "stack is in UPDATE_IN_PROGRESS state", but the
# next push's run succeeds once it does.
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    uses: ./.github/workflows/build-and-deploy.yml
    with:
      ref: ${{ github.sha }}
      # A forward push's infra changes are already the intent (see
      # build-and-deploy.yml's allow-replacements input) - the safety check
      # exists for rollbacks, where a replacement would be a surprise, not
      # a decision someone just made.
      allow-replacements: true
    permissions:
      id-token: write
      contents: read

  # Only a Version Packages PR merge (branch `changeset-release/main`, see
  # changesets.yml) mints a release - and only once the deploy above has
  # actually succeeded, so every release-N tag is guaranteed to have been
  # verified deployable, never just "merged".
  tag-release:
    needs: build-and-deploy
    if: contains(github.event.head_commit.message, 'changeset-release/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Tag and publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST=$(gh api "repos/${{ github.repository }}/tags" --paginate --jq '.[].name' \
            | grep -E '^release-[0-9]+$' | sed 's/release-//' | sort -n | tail -1)
          NEXT=$(( ${LAST:-0} + 1 ))
          TAG="release-$NEXT"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" \
            --notes "Bundled deploy of all packages as versioned at commit ${{ github.sha }}."
