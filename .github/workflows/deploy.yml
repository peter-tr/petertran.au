name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: write

jobs:
  build-and-deploy:
    uses: ./.github/workflows/build-and-deploy.yml
    with:
      ref: ${{ github.sha }}
    permissions:
      id-token: write
      contents: read

  # Only a Version Packages PR merge (branch `changeset-release/main`, see
  # changesets.yml) mints a release - and only once the deploy above has
  # actually succeeded, so every release-N tag is guaranteed to have been
  # verified deployable, never just "merged".
  tag-release:
    needs: build-and-deploy
    if: contains(github.event.head_commit.message, 'changeset-release/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Tag and publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST=$(gh api "repos/${{ github.repository }}/tags" --paginate --jq '.[].name' \
            | grep -E '^release-[0-9]+$' | sed 's/release-//' | sort -n | tail -1)
          NEXT=$(( ${LAST:-0} + 1 ))
          TAG="release-$NEXT"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" \
            --notes "Bundled deploy of all packages as versioned at commit ${{ github.sha }}."
