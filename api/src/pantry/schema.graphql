"""
Where an inventory item is physically stored.
"""
enum StorageLocation {
  FRIDGE
  FREEZER
  PANTRY
}

"""
A single purchase batch logged against an inventory item. Kept even after
the item's current quantity changes, so "bought 3 on the 1st, 2 more on the
9th" is still visible even though the two batches are now one row.
"""
type Purchase {
  """
  Date this batch was purchased, formatted YYYY-MM-DD.
  """
  date: String!
  """
  Price paid for this batch, in AUD. Null if unknown.
  """
  price: Float
  """
  Quantity purchased in this batch.
  """
  quantity: Float!
}

"""
The most recent automated price lookup for an item flagged with `trackPrice`.
Written only by the scheduled price-check Lambda, never by a user mutation
directly. Coles only - Woolworths' pages don't reliably surface a price
through search/fetch, so that retailer is skipped entirely rather than shown
as a usually-null field. `note` carries caveats the lookup surfaces (e.g.
"assumed standard 12-pack" or "multiple pack sizes found") rather than a hard
guarantee the number is exact.
"""
type LastKnownPrice {
  """
  Most recently found Coles price, in AUD. Null if unconfirmed.
  """
  colesPrice: Float
  """
  Direct link to the Coles product page, if the lookup actually found one -
  never a guessed/constructed URL. Null if no confirmed product page was
  found (a "sync now" or the next daily check may find one later).
  """
  productUrl: String
  """
  Freeform caveat from the lookup, e.g. "assumed standard 12-pack - item name
  didn't specify a variant" or "multiple pack sizes found, showing loose/per-
  kg". Null if nothing noteworthy.
  """
  note: String
  """
  Timestamp of this lookup, ISO 8601.
  """
  checkedAt: String!
  """
  Cost/duration/tool-use info for the Anthropic call that produced this
  price - only meaningful to show when the relevant nerdMode* setting is on
  (nerdModeInventory for InventoryItem, nerdModeShoppingList for
  ShoppingListEntry).
  """
  debugInfo: AiCallDebugInfo!
}

"""
A single item currently tracked in stock - fridge, freezer, or pantry.
"""
type InventoryItem {
  """
  Unique identifier.
  """
  id: ID!
  """
  Item name, e.g. "Milk" or "Chicken breast".
  """
  name: String!
  """
  Freeform grouping, e.g. "Dairy" or "Produce". Null if uncategorized.
  """
  category: String
  """
  Where this item is stored.
  """
  location: StorageLocation!
  """
  How much is currently on hand.
  """
  quantity: Float!
  """
  Unit the quantity is measured in, e.g. "g", "L", "pcs". Null if unspecified.
  """
  unit: String
  """
  Price paid on the most recent purchase, in AUD. Null if unknown.
  """
  price: Float
  """
  Date of the most recent purchase, formatted YYYY-MM-DD. Null if unknown.
  """
  purchasedAt: String
  """
  Date this item is expected to expire, formatted YYYY-MM-DD. Null if unknown.
  """
  expiresAt: String
  """
  True for staple items you always want to keep stocked (salt, oil, eggs,
  milk...). When a staple runs out, it's added to the shopping list instead
  of just disappearing.
  """
  isStaple: Boolean!
  """
  True for low-attention items (salt, pepper, oil, spices...) that don't
  need frequent checking - hidden from the main inventory list by default.
  """
  lowPriority: Boolean!
  """
  True if manually flagged as running low. Independent of quantity - some
  items (a spice jar, a bag of flour) don't have a quantity that maps
  cleanly to "almost out".
  """
  nearlyEmpty: Boolean!
  """
  True to include this item in the daily automated price-check job. Setting
  this doesn't itself look anything up - it's a flag the scheduled job reads;
  `lastKnownPrice` is populated asynchronously, not on the same request.
  """
  trackPrice: Boolean!
  """
  Most recent automated price lookup, if `trackPrice` is true and the job has
  run at least once for this item. Null if never checked yet.
  """
  lastKnownPrice: LastKnownPrice
  """
  Every purchase batch logged for this item, oldest first. `quantity` /
  `purchasedAt` / `price` above always reflect the current total and most
  recent batch - this is the full history behind them.
  """
  purchases: [Purchase!]!
  """
  Timestamp this row was first created, ISO 8601.
  """
  addedAt: String!
  """
  Timestamp this row was last modified, ISO 8601.
  """
  updatedAt: String!
}

"""
Input for adding a new inventory item.
"""
input AddInventoryItemInput {
  """
  Item name, e.g. "Milk" or "Chicken breast".
  """
  name: String!
  """
  Freeform grouping, e.g. "Dairy" or "Produce".
  """
  category: String
  """
  Where this item is stored.
  """
  location: StorageLocation!
  """
  How much is on hand.
  """
  quantity: Float!
  """
  Unit the quantity is measured in, e.g. "g", "L", "pcs".
  """
  unit: String
  """
  Price paid for this item, in AUD.
  """
  price: Float
  """
  Date this item was purchased, formatted YYYY-MM-DD.
  """
  purchasedAt: String
  """
  Date this item is expected to expire, formatted YYYY-MM-DD.
  """
  expiresAt: String
  """
  True to mark this a staple item you always want to keep stocked. Defaults
  to false.
  """
  isStaple: Boolean
  """
  True to hide this from the main inventory list by default. Defaults to
  false.
  """
  lowPriority: Boolean
  """
  True to flag this as running low. Defaults to false.
  """
  nearlyEmpty: Boolean
  """
  True to include this item in the daily automated price-check job. Defaults
  to false.
  """
  trackPrice: Boolean
}

"""
Input for updating an existing inventory item. Only provided fields are changed.
"""
input UpdateInventoryItemInput {
  name: String
  category: String
  location: StorageLocation
  quantity: Float
  unit: String
  price: Float
  purchasedAt: String
  expiresAt: String
  isStaple: Boolean
  lowPriority: Boolean
  nearlyEmpty: Boolean
  trackPrice: Boolean
}

"""
An item that ran out and needs buying - added automatically when a staple
item (see InventoryItem.isStaple) is fully removed from inventory.
"""
type ShoppingListEntry {
  """
  Unique identifier.
  """
  id: ID!
  """
  Name of the item that needs buying.
  """
  name: String!
  """
  How much is needed, e.g. 1 for "1 kg of coffee beans". Null if no
  particular amount was specified - just "buy this".
  """
  quantity: Float
  """
  Unit the quantity is measured in, e.g. "kg", "L", "pcs". Null if
  quantity is null.
  """
  unit: String
  """
  Freeform note on why this was added, e.g. "For: Hotdogs" when added as a
  missing recipe ingredient. Null if there's no particular reason beyond
  "need to buy this".
  """
  note: String
  """
  True if this was added because a staple item ran out (or was manually
  flagged as one) - so once it's bought and recorded back into inventory,
  it can stay marked as a staple instead of that having to be re-set by
  hand every time it cycles through the shopping list.
  """
  isStaple: Boolean!
  """
  Category, e.g. "Spices" - same free-form category concept as
  InventoryItem.category, set by the AI when adding via the command bar or
  carried over when an item cycles back onto the shopping list from
  inventory (see InventoryItem.category's persistence note). Null if
  unset.
  """
  category: String
  """
  The recipe this was added for, e.g. "Chicken Pesto Pasta" - set when
  added via a recipe's "add missing ingredients" action. Distinct from
  `note` (which stays freeform) so the shopping list can be filtered by
  recipe. Null if not added from a recipe.
  """
  recipeTag: String
  """
  Manually flagged as needed as soon as possible - independent of
  isStaple/category, purely a "get this today" signal shown and
  filterable separately.
  """
  urgent: Boolean!
  """
  True if this entry's price should be checked daily against Coles - same
  concept as InventoryItem.trackPrice, independently toggleable since an
  item can be tracked on the shopping list before it's ever in inventory.
  """
  trackPrice: Boolean!
  """
  Most recent Coles price check result, written by the price-check worker
  Lambda. Null until the first check runs after trackPrice is enabled.
  """
  lastKnownPrice: LastKnownPrice
  """
  Timestamp this entry was added, ISO 8601.
  """
  addedAt: String!
}

"""
Input for updating an existing shopping list entry. Only provided fields
are changed. Distinct from addToShoppingList, which upserts by matching
name - this updates a specific entry by id, so renaming it doesn't create
a second row.
"""
input UpdateShoppingListEntryInput {
  name: String
  quantity: Float
  unit: String
  note: String
  isStaple: Boolean
  category: String
  recipeTag: String
  urgent: Boolean
  trackPrice: Boolean
}

"""
Shared display/view preferences for the pantry page. There's no per-user
login here, so these are simply global - one setting shared by everyone who
visits, so a change made on one device shows up everywhere.
"""
type PantrySettings {
  """
  Which grouping the Inventory list is currently viewed by: "location",
  "category", "priority" (needs attention vs. low priority), or "all".
  """
  view: String!
  """
  How items are ordered within each group: "recent" (most recently added
  first, the default), "name" (A-Z), "expiry" (soonest first, no-expiry
  items last), or "quantity" (highest first).
  """
  sort: String!
  """
  True for the compact "Simple" item-row display, false for "Details".
  """
  simple: Boolean!
  """
  True if the Inventory panel's Group-by/Show controls are collapsed.
  """
  optionsCollapsed: Boolean!
  """
  Which groups (formatted "<view>:<groupKey>") are currently collapsed.
  """
  collapsedGroups: [String!]!
  """
  The user-curated quick-add list shown in Common Items.
  """
  commonItems: [String!]!
  """
  True if the Shopping list panel is collapsed.
  """
  shoppingListCollapsed: Boolean!
  """
  True if lowPriority inventory items are currently shown - they're
  hidden by default.
  """
  showLowPriority: Boolean!
  """
  Narrows the Inventory list to a single category when set. Null shows
  everything, regardless of which `view` grouping is active.
  """
  categoryFilter: String
  """
  Curated list of category names offered in the item-edit category
  dropdown - grows as new ones are added, same idea as commonItems.
  """
  categories: [String!]!
  """
  True if the Add item panel's "more details" fields are currently shown.
  """
  addItemDetailsShown: Boolean!
  """
  True if the Add item panel is collapsed.
  """
  addItemCollapsed: Boolean!
  """
  True if the Common items panel is collapsed.
  """
  commonItemsCollapsed: Boolean!
  """
  Narrows the Shopping list to a single category when set. Null shows
  everything.
  """
  shoppingCategoryFilter: String
  """
  Narrows the Shopping list to entries tagged with a specific recipe
  (ShoppingListEntry.recipeTag) when set. Null shows everything.
  """
  shoppingRecipeFilter: String
  """
  True to narrow the Shopping list to urgent entries only.
  """
  shoppingUrgentOnly: Boolean!
  """
  True if the Shopping list panel's filter/sort controls are collapsed -
  same concept as InventoryItem's optionsCollapsed, just for the other list.
  """
  shoppingOptionsCollapsed: Boolean!
  """
  How the Shopping list is ordered: "recent" (most recently added first) or
  "urgent" (urgent entries first, then most recently added).
  """
  shoppingSort: String!
  """
  True for the compact "Simple" shopping list row display, false for
  "Details" - same concept as InventoryItem's `simple`, just for the other
  list.
  """
  shoppingSimple: Boolean!
  """
  Whether the daily urgent-shopping-list digest email is sent at all.
  """
  digestEnabled: Boolean!
  """
  Hour of the day (0-23, Australia/Sydney local time) the digest email is
  sent, when digestEnabled is true.
  """
  digestHour: Int!
  """
  Shows extra debug info (AI call cost, duration, search/fetch counts) next
  to inventory rows - see AiCallDebugInfo. Independent from
  nerdModeShoppingList/nerdModeCommandBar since each is usually checked
  separately.
  """
  nerdModeInventory: Boolean!
  """
  Same as nerdModeInventory, but for the shopping list's own price-tracking
  debug info.
  """
  nerdModeShoppingList: Boolean!
  """
  Same as nerdModeInventory, but for the AI command bar's own call cost -
  kept separate from nerdModeShoppingList since a command-bar reply isn't
  specific to either list.
  """
  nerdModeCommandBar: Boolean!
}

"""
Input for updating shared pantry settings. Only provided fields are changed.
"""
input PantrySettingsInput {
  view: String
  sort: String
  simple: Boolean
  optionsCollapsed: Boolean
  collapsedGroups: [String!]
  commonItems: [String!]
  shoppingListCollapsed: Boolean
  showLowPriority: Boolean
  categoryFilter: String
  categories: [String!]
  addItemDetailsShown: Boolean
  addItemCollapsed: Boolean
  commonItemsCollapsed: Boolean
  shoppingCategoryFilter: String
  shoppingRecipeFilter: String
  shoppingUrgentOnly: Boolean
  shoppingOptionsCollapsed: Boolean
  shoppingSort: String
  shoppingSimple: Boolean
  digestEnabled: Boolean
  digestHour: Int
  nerdModeInventory: Boolean
  nerdModeShoppingList: Boolean
  nerdModeCommandBar: Boolean
}

"""
Which existing mutation a proposed command action maps to.
"""
enum PantryActionType {
  RECORD_PURCHASE
  UPDATE_INVENTORY_ITEM
  REMOVE_INVENTORY_ITEM
  ADD_TO_SHOPPING_LIST
  REMOVE_FROM_SHOPPING_LIST
}

"""
A single change proposed by parseCommand, not yet executed. The client
confirms it by calling the named mutation with the given arguments -
parseCommand itself never touches inventory data.
"""
type ProposedAction {
  """
  Which mutation this maps to.
  """
  type: PantryActionType!
  """
  Human-readable one-line description of what this action will do, e.g.
  "Add 2 L Milk to the fridge, bought today for $4.50".
  """
  summary: String!
  """
  The exact Mutation field name to call to apply this, e.g. "recordPurchase".
  """
  mutationName: String!
  """
  JSON-encoded variables to call that mutation with, e.g.
  {"input":{"name":"Milk","location":"FRIDGE","quantity":2}}.
  """
  argsJson: String!
  """
  Quick, no-search ballpark estimate of the item's price in AUD, for
  RECORD_PURCHASE/ADD_TO_SHOPPING_LIST only - null for every other action
  type, or when no estimate could be made. This is never a confirmed live
  price (see InventoryItem.lastKnownPrice for that) - display it with a "~"
  prefix so it's clearly a rough guess, not a fact.
  """
  estimatedPriceAud: Float
}

"""
A single ingredient within a RecipeSuggestion.
"""
type RecipeIngredient {
  """
  Ingredient name, e.g. "Hot dog buns".
  """
  name: String!
  """
  Freeform suggested amount, e.g. "500g", "2 cloves", "to taste". Null if
  not applicable. Not a structured quantity/unit - recipe amounts don't
  fit the numeric fields used for actual inventory tracking.
  """
  amount: String
  """
  True if this is already covered by something in current inventory.
  """
  haveInInventory: Boolean!
  """
  The matching inventory item, if haveInInventory is true. Null otherwise.
  """
  itemId: ID
  """
  The leading number in `amount` when it's a single clean numeric quantity
  (e.g. "2.5 cups" -> 2.5, "400g" -> 400) - used client-side to scale the
  displayed amount when servings change. 0 when `amount` isn't cleanly
  scalable (a range, "to taste", etc.) - the client leaves those unchanged
  rather than guessing. Deliberately not nullable, unlike `amount` itself -
  see the comment on ParsedCommand's schema-budget constraint.
  """
  quantity: Float!
  """
  Best-effort estimated price in AUD for this ingredient at its amount
  above (current Australian grocery prices), before any servings scaling.
  0 only for genuinely negligible items (a pinch of salt).
  """
  estimatedPriceAud: Float!
}

"""
A recipe proposed by parseCommand, with its ingredients checked against
current inventory - not a change to anything, just a suggestion. The
client decides whether to turn any missing ingredients into shopping-list
actions (via addToShoppingList), the same way it confirms any other
proposed action.
"""
type RecipeSuggestion {
  """
  Recipe name, e.g. "Classic Hot Dogs".
  """
  name: String!
  """
  Short description of the dish. Null if not needed.
  """
  description: String
  """
  Every ingredient the recipe calls for, each flagged with whether it's
  already in stock.
  """
  ingredients: [RecipeIngredient!]!
  """
  The serving count `ingredients[].quantity` and the nutrition fields below
  are calibrated to - 1 unless the input specifies otherwise. The client
  scales ingredient quantities from this baseline when the servings
  stepper changes; nutrition figures are already per-serving and don't
  need scaling.
  """
  baseServings: Int!
  """
  Best-effort estimated nutrition per serving (not per whole recipe) -
  always a real estimate from general nutritional knowledge, never 0
  standing in for "unknown".
  """
  caloriesPerServing: Float!
  proteinGPerServing: Float!
  carbsGPerServing: Float!
  fatGPerServing: Float!
}

"""
One message in a parseCommand conversation, in the same shape Claude's own
chat history uses - "user" for what was typed, "assistant" for what a
prior parseCommand call returned (JSON-encoded), so a follow-up input like
"shopping list, 1 bottle" can be understood as completing an earlier
request instead of being a new, standalone, likely-unclear one.
"""
input ConversationMessage {
  role: String!
  content: String!
}

"""
Debug/cost info about a single Anthropic API call, shown on the pantry page
only when the relevant PantrySettings.nerdMode* setting is on - purely
informational, nothing else reads or depends on this data.
"""
type AiCallDebugInfo {
  """
  Estimated cost of this call in USD, computed from the model's actual
  token usage and its known per-token pricing. An estimate, not a billed
  amount.
  """
  costUsd: Float!
  """
  Wall-clock duration of the call, in milliseconds.
  """
  durationMs: Int!
  """
  Number of web_search tool calls made during this request. Always 0 for
  calls that don't use it (e.g. the AI command bar).
  """
  searchesUsed: Int!
  """
  Number of web_fetch tool calls made during this request. Always 0 for
  calls that don't use it.
  """
  fetchesUsed: Int!
}

"""
Result of interpreting a natural-language pantry command.
"""
type ParsedCommand {
  """
  Set when the input was a read-only question, answered directly from
  current inventory/shopping-list data. Null otherwise.
  """
  answer: String
  """
  Set alongside answer for a list-shaped question (e.g. "what spices do I
  have?") - one line per item, rendered as an actual list rather than
  packed into answer's prose. Null for an ordinary answer with no natural
  list structure.
  """
  answerItems: [String!]
  """
  Set when the input was interpreted as one or more inventory changes,
  proposed but not yet applied. Null otherwise.
  """
  actions: [ProposedAction!]
  """
  Set when the input asked for a recipe or a recommendation based on
  what's in stock. Null otherwise.
  """
  recipes: [RecipeSuggestion!]
  """
  Set when the command couldn't be understood or mapped to anything -
  explains why, or asks a clarifying question. Null on success (answer,
  actions, or recipes) unless there's still something worth flagging
  alongside them (e.g. part of a multi-item request was skipped).
  """
  message: String
  """
  Cost/duration info for the Anthropic call that parsed this command - only
  meaningful to show when nerdModeCommandBar is on. searchesUsed/fetchesUsed
  are always 0 here since command parsing doesn't use those
  tools (see AiCallDebugInfo).
  """
  debugInfo: AiCallDebugInfo!
}

"""
Read-only entry point into pantry/fridge inventory.
"""
type Query {
  """
  Items currently in stock, most recently added first. Optionally filter to
  a single storage location.
  """
  inventory(location: StorageLocation): [InventoryItem!]!
  """
  A single inventory item by ID. Null if it doesn't exist.
  """
  inventoryItem(id: ID!): InventoryItem
  """
  Staple items that have run out and need buying, oldest first.
  """
  shoppingList: [ShoppingListEntry!]!
  """
  Shared display/view preferences - see PantrySettings.
  """
  settings: PantrySettings!
  """
  Interpret a natural-language command (typed or dictated) against current
  inventory/shopping-list state - e.g. "add 2L milk to the fridge",
  "what's expiring this week?", or "what can I make for dinner?". Never
  mutates anything itself; returns a direct answer, proposed actions, or
  recipe suggestions for the client to confirm/apply via their normal
  mutations. Pass prior turns as `history` to continue a conversation -
  e.g. answering a clarifying question this returned last time.
  """
  parseCommand(input: String!, history: [ConversationMessage!]): ParsedCommand!
}

"""
Write operations for pantry/fridge inventory.
"""
type Mutation {
  """
  Add a new inventory item as its own row, even if one with a matching name
  already exists. Most callers want `recordPurchase` instead.
  """
  addInventoryItem(input: AddInventoryItemInput!): InventoryItem!
  """
  Adds an item - or, if one with a matching name (case, whitespace, and
  simple plurals normalized away, e.g. "egg"/"Eggs"/"EGG " all match) already
  exists in the same location, folds the new quantity into it and logs this
  as an additional purchase batch instead of creating a duplicate row.
  """
  recordPurchase(input: AddInventoryItemInput!): InventoryItem!
  """
  Update an existing inventory item. Only provided fields are changed.
  """
  updateInventoryItem(id: ID!, input: UpdateInventoryItemInput!): InventoryItem!
  """
  Remove an inventory item, e.g. once it's used up. If it's a staple
  (isStaple: true), it's added to the shopping list first. Returns true if a
  row was actually deleted.
  """
  removeInventoryItem(id: ID!): Boolean!
  """
  Manually add an item to the shopping list, or update the quantity needed
  if it's already there - e.g. something you remembered you need that
  isn't a staple currently tracked in inventory. Matches by the same
  normalized-name rule as recordPurchase, so it won't duplicate an entry
  that's already on the list - calling this again for an existing entry
  updates its quantity/unit/note instead (only overwriting fields you
  provide). isStaple only ever gets set true this way, never back to
  false, so one staple-triggered add can't be undone by an unrelated call.
  """
  addToShoppingList(
    name: String!
    quantity: Float
    unit: String
    note: String
    isStaple: Boolean
    category: String
    recipeTag: String
    urgent: Boolean
  ): ShoppingListEntry!
  """
  Update a specific shopping list entry by id - e.g. correcting its name
  or quantity. Unlike addToShoppingList, this never merges into a
  different entry, even if the new name would otherwise match one.
  """
  updateShoppingListEntry(id: ID!, input: UpdateShoppingListEntryInput!): ShoppingListEntry!
  """
  Remove an entry from the shopping list, e.g. once it's been bought.
  Returns true if a row was actually deleted.
  """
  removeFromShoppingList(id: ID!): Boolean!
  """
  Update shared pantry settings. Only provided fields are changed.
  """
  updateSettings(input: PantrySettingsInput!): PantrySettings!
  """
  Trigger a price check for every trackPrice-flagged item right now, instead
  of waiting for the next daily run. Fire-and-forget - this returns as soon
  as the check has been kicked off, not once it's finished; results land on
  each item's lastKnownPrice asynchronously, the same as the scheduled run.
  Always returns true (a failure to even start would throw, not return
  false).
  """
  syncPricesNow: Boolean!
}
