"""
Standalone schema for the Imposter party game - served by its own Lambda,
entirely separate from petertran.au's resume API. Not linked from that
API's schema or GraphiQL explorer.
"""
type Query {
  """
  Built-in word categories the game can pick a word pair from. Used when
  `createImposterGame`'s wordSource is BUILTIN, and as an optional theme
  hint when it's AI.
  """
  imposterCategories: [ImposterCategory!]!
  """
  State of a single game session, keyed by its short join code. Null if the
  code doesn't exist or its game has expired.
  """
  imposterGame(gameId: String!): ImposterGame
  """
  All-time, anonymized usage stats for the game - total games played,
  never any individual game's details or player names.
  """
  imposterStats: ImposterStats!
}

type Mutation {
  """
  Start a new game: picks a word pair (from a built-in category or
  AI-generated), assigns imposter(s) at random, and returns the new
  session's join code as `gameId`.
  """
  createImposterGame(
    wordSource: ImposterWordSource!
    """
    Required when wordSource is BUILTIN - one of `imposterCategories`' ids.
    Used as an optional theme hint when wordSource is AI and customCategory
    isn't set.
    """
    categoryId: String
    """
    Freeform theme for an AI-generated pair, e.g. "80s movies". Only used
    when wordSource is AI; a blank value asks for a surprise instead.
    """
    customCategory: String
    playerNames: [String!]!
    """
    How many players get the imposter word. Defaults to 1, capped so at
    least two players still share the civilian word.
    """
    imposterCount: Int
    """
    Whether imposters get a related "hint" word at all, or nothing.
    Defaults to true.
    """
    hintEnabled: Boolean
    """
    How closely related the civilian and imposter words are - only matters
    when hintEnabled is true, since that word is never revealed to anyone
    otherwise. Defaults to NORMAL.
    """
    difficulty: ImposterDifficulty
    """
    Withhold the category/theme label from players until RESULTS, instead
    of showing it throughout - knowing the category (even without the
    built-in category's exact word) makes both bluffing and catching the
    imposter easier. Defaults to false.
    """
    hideCategory: Boolean
  ): ImposterGame!
  """
  Reveal one player's word. Any not-yet-revealed player can go in any order
  during the REVEAL phase - once everyone has revealed, the game moves to
  DISCUSSION.
  """
  revealImposterWord(gameId: String!, playerId: String!): ImposterRevealResult!
  """
  Move a game from DISCUSSION to RESULTS, revealing who the imposter(s)
  were and both words. Call once the group is done discussing and voting
  out loud.
  """
  revealImposter(gameId: String!): ImposterGame!
}

"""
Where a word pair for a new game comes from.
"""
enum ImposterWordSource {
  """
  A random pair from a curated, built-in category.
  """
  BUILTIN
  """
  A fresh pair generated by Claude, optionally themed via customCategory.
  """
  AI
}

"""
How closely related the civilian and imposter words are.
"""
enum ImposterDifficulty {
  """
  Words closely related enough that the imposter can bluff without much
  effort, e.g. "Coffee" vs "Tea".
  """
  NORMAL
  """
  Words that share a theme but take real lateral thinking to connect - a
  genuine stretch, not just a different item from the same shelf, e.g.
  "Coffee" vs "Popcorn".
  """
  HARD
}

"""
A single word-pair category the game can draw from.
"""
type ImposterCategory {
  """
  Stable identifier to pass to `createImposterGame`.
  """
  id: String!
  """
  Human-readable name shown in the category picker.
  """
  label: String!
}

"""
Where a single game session currently sits.
"""
enum ImposterPhase {
  """
  Players are privately revealing their word on this device, in any order.
  """
  REVEAL
  """
  Everyone has seen their word - the group discusses and votes out loud.
  """
  DISCUSSION
  """
  The imposter(s) have been revealed, along with both words.
  """
  RESULTS
}

"""
A single player within a game session.
"""
type ImposterPlayer {
  """
  Identifier scoped to this game, used to reveal this player's word via
  `revealImposterWord`.
  """
  id: String!
  """
  Name entered for this player at game creation.
  """
  name: String!
  """
  True once this player has revealed their word.
  """
  hasRevealed: Boolean!
}

"""
State of a single game session. Word and imposter identity are withheld
from this type until `phase` is RESULTS, so polling this before then can't
spoil the game.
"""
type ImposterGame {
  """
  Short join code identifying this session, used in the game's URL.
  """
  gameId: String!
  """
  Label of the category (or AI theme) the word pair was drawn from. Null
  until phase is RESULTS if this game's hideCategory was set to true.
  """
  categoryLabel: String
  """
  Whether the imposter(s) were given a related hint word, or nothing.
  """
  hintEnabled: Boolean!
  """
  Current phase of the game.
  """
  phase: ImposterPhase!
  """
  All players in this game.
  """
  players: [ImposterPlayer!]!
  """
  Ids of the players who were the imposter. Null until phase is RESULTS.
  """
  imposterPlayerIds: [String!]
  """
  The word every non-imposter player received. Null until phase is RESULTS.
  """
  civilianWord: String
  """
  The word imposters received. Null until phase is RESULTS, and also null
  (even at RESULTS) if hintEnabled was false.
  """
  imposterWord: String
}

"""
Result of a single player revealing their word.
"""
type ImposterRevealResult {
  """
  Updated game state.
  """
  game: ImposterGame!
  """
  The word just revealed to this player. Null if they're the imposter and
  this game has hintEnabled: false.
  """
  word: String
  """
  True if this player is one of the imposters.
  """
  isImposter: Boolean!
}

"""
All-time, anonymized usage stats for the game.
"""
type ImposterStats {
  """
  Total number of games ever started - a single running counter, not a
  window, so it never resets.
  """
  gamesPlayedTotal: Int!
  """
  Number of those games that were actually played through to the imposter
  being revealed, rather than abandoned partway.
  """
  gamesCompletedTotal: Int!
  """
  Average time from a game starting to the imposter being revealed, in
  milliseconds, across all completed games.
  """
  avgGameDurationMs: Float!
}
