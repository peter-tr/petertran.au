"""
A person - in this schema, always Peter Tran.
"""
type Person {
  """
  Full name.
  """
  name: String!
  """
  Contact email address.
  """
  email: String!
  """
  City and country Peter is currently based in.
  """
  location: String!
  """
  Australian Government security clearance level held.
  """
  clearance: String!
  """
  External profile and site links.
  """
  links: [Link!]!
}

"""
The human behind the resume - hobbies and interests outside of work.
"""
type Interests {
  """
  Hobbies and interests outside of work.
  """
  hobbies: [String!]!
  """
  Favorite foods.
  """
  favoriteFoods: [String!]!
  """
  Favorite TV shows.
  """
  favoriteShows: [String!]!
}

"""
A single external link, e.g. LinkedIn, GitHub, or a personal site.
"""
type Link {
  """
  Human-readable label for the link, e.g. "GitHub".
  """
  label: String!
  """
  Fully-qualified URL.
  """
  url: String!
}

"""
A degree completed at a university.
"""
type Education {
  """
  Name of the institution.
  """
  institution: String!
  """
  Degree title(s) conferred.
  """
  degree: String!
  """
  City and country of the institution.
  """
  location: String!
  """
  Month the degree program started, formatted YYYY-MM.
  """
  startDate: String!
  """
  Month the degree was completed, formatted YYYY-MM.
  """
  endDate: String!
  """
  Academic honors or GPA achieved.
  """
  honors: String!
}

"""
A single role held at a company. Work history is a list of these,
most recent first.
"""
type Experience {
  """
  Name of the employer.
  """
  company: String!
  """
  Job title held in this role.
  """
  role: String!
  """
  City and country this role was based in.
  """
  location: String!
  """
  Month this role started, formatted YYYY-MM.
  """
  startDate: String!
  """
  Month this role ended, formatted YYYY-MM. Null if the role is current.
  """
  endDate: String
  """
  True if this is the current role (endDate is null).
  """
  isCurrent: Boolean!
  """
  One-line description of the team or project this role sits within, if applicable.
  """
  summary: String
  """
  Bullet-point achievements from this role.
  """
  highlights: [String!]!
}

"""
A side project built outside of full-time work.
"""
type Project {
  """
  Project name.
  """
  name: String!
  """
  Languages, frameworks, and services used to build it.
  """
  stack: [String!]!
  """
  What the project does, and what's notable about how it was built.
  """
  description: String!
  """
  Link to the source, e.g. a GitHub repo. Null if there isn't a public one.
  """
  url: String
}

"""
A grouped set of related skills, e.g. "Languages" or "Infrastructure & Tools".
"""
type SkillCategory {
  """
  Name of the category.
  """
  category: String!
  """
  Individual skills or tools within this category.
  """
  items: [String!]!
}

"""
An external training program or development scheme completed outside of
regular employment or study.
"""
type Program {
  """
  Name of the program.
  """
  name: String!
  """
  Organization that ran the program.
  """
  organization: String!
  """
  What the program covered.
  """
  description: String!
  """
  Month the program started, formatted YYYY-MM.
  """
  startDate: String!
  """
  Month the program ended, formatted YYYY-MM.
  """
  endDate: String!
}

"""
Read-only entry point into everything this API knows.
"""
type Query {
  """
  Who is behind this API.
  """
  person: Person!
  """
  Degrees completed, most recent first.
  """
  education: [Education!]!
  """
  Work history, most recent role first. Optionally filter by company name
  (case-insensitive, partial match) or restrict to the current role only.
  """
  experience(company: String, currentOnly: Boolean): [Experience!]!
  """
  Side projects built outside of full-time work.
  """
  projects: [Project!]!
  """
  Skills grouped by category. Optionally filter to a single category
  (case-insensitive, partial match), e.g. "Languages".
  """
  skills(category: String): [SkillCategory!]!
  """
  External training programs completed outside regular employment or study.
  """
  programs: [Program!]!
  """
  The human behind the resume - hobbies and interests outside of work.
  """
  interests: Interests!
  """
  Utility operations about this API itself, rather than about Peter.
  """
  meta: Meta!
}

"""
Utility operations about this API itself - separated from the resume
content above since none of this is actually about Peter.
"""
type Meta {
  """
  Describe what you'd like to know in plain English, and get back a valid
  GraphQL query against this exact schema. Powered by Claude.
  """
  generateQuery(prompt: String!): GeneratedQuery!
  """
  Live operational stats about this API itself, pulled from CloudWatch and
  DynamoDB - not mocked.
  """
  systemStats: SystemStats!
  """
  AWS X-Ray timing breakdown for a specific past request, keyed by the
  traceId from one of `systemStats`'s operations. Only covers what actually
  happens inside the Lambda invocation (its own execution, DynamoDB calls,
  the Anthropic API call) - X-Ray has no visibility into the browser or
  CloudFront/S3, since those aren't part of the same trace. Empty if the
  trace has expired or wasn't found.
  """
  traceBreakdown(traceId: String!): [TraceSegment!]!
  """
  Real all-time AWS usage cost for this project, in USD, before any
  promotional credits are applied - pulled from AWS Cost Explorer (limited to
  the last 12 months, comfortably covering this project's whole history) and
  cached for a few hours, since Cost Explorer itself only updates about once
  a day.
  """
  awsCostUsd: Float!
  """
  Real all-time Anthropic API usage cost for this project, in USD - pulled
  from Anthropic's Cost Report API (also limited to the last 12 months) and
  cached for about an hour. Zero if no Admin API key is configured.
  """
  anthropicCostUsd: Float!
  """
  awsCostUsd + anthropicCostUsd - the site's total real running cost since
  it was built.
  """
  totalCostUsd: Float!
}

"""
One timed segment (or subsegment) within a single AWS X-Ray trace.
"""
type TraceSegment {
  """
  What this segment represents, e.g. "Lambda", "DynamoDB", or "Anthropic API".
  """
  name: String!
  """
  Milliseconds after the trace's start that this segment began.
  """
  startOffsetMs: Float!
  """
  How long this segment took, in milliseconds.
  """
  durationMs: Float!
}

"""
Live operational stats about the API serving this schema.
"""
type SystemStats {
  """
  Total number of times the GraphQL Lambda has ever been invoked - a single
  running counter, not a rolling window, so it never resets.
  """
  requestsTotal: Int!
  """
  Average Lambda execution duration in milliseconds over the last 24 hours.
  """
  avgDurationMs: Float!
  """
  Total number of Ask Claude queries served since launch.
  """
  aiQueriesTotal: Int!
  """
  All-time unique visitor IPs. No cookies or client-side tracking - derived
  from the source IP already used for rate limiting.
  """
  uniqueVisitorsTotal: Int!
  """
  Call count and average latency per named GraphQL operation across all time,
  most-called first, capped to the top 8. Operation names are unbounded
  (AI-generated queries get a fresh Claude-chosen name each time), which is
  why this is capped rather than exhaustive.
  """
  operations: [OperationStats!]!
  """
  Same breakdown as `operations`, but only counting the last 30 days.
  """
  operationsLast30Days: [OperationStats!]!
  """
  Daily request counts for the last 30 days, oldest first.
  """
  requestsByDay: [DailyCount!]!
}

"""
Number of requests in a single daily bucket.
"""
type DailyCount {
  """
  ISO 8601 timestamp (UTC) for the start of this day.
  """
  timestamp: String!
  """
  Number of requests during this day.
  """
  count: Int!
}

"""
Usage stats for a single named GraphQL operation, e.g. "Resume" or
"GenerateQuery". Unnamed operations are grouped under "Anonymous".
"""
type OperationStats {
  """
  The operation's name as sent by the client.
  """
  name: String!
  """
  Number of times this operation has been called.
  """
  count: Int!
  """
  Average end-to-end latency in milliseconds for this operation.
  """
  avgDurationMs: Float!
  """
  The most recent query text run under this operation name. Null for
  mutations (never sampled, to avoid recording contact-form submissions)
  and for operations that predate this field.
  """
  lastQuery: String
  """
  Variables from that same sample call, JSON-encoded. Null if it had none.
  """
  lastVariables: String
  """
  AWS X-Ray trace ID for that same sample call, if X-Ray was active. Pass
  this to `traceBreakdown` to see its Lambda/DynamoDB/Anthropic timing.
  """
  lastTraceId: String
}

"""
Result of asking the API to write a GraphQL query for you.
"""
type GeneratedQuery {
  """
  The generated GraphQL query text, ready to paste into the explorer. Null if
  the request couldn't be answered from this schema.
  """
  query: String
  """
  Set when a query couldn't be generated, explaining why. Null on success.
  """
  message: String
}

"""
Input for sending a message through the contact form.
"""
input ContactInput {
  """
  Sender's name.
  """
  name: String!
  """
  Sender's email address, so a reply can be sent.
  """
  email: String!
  """
  The message body.
  """
  message: String!
}

"""
Result of submitting a contact message.
"""
type SendMessagePayload {
  """
  True if the message was received and stored successfully.
  """
  success: Boolean!
  """
  A friendly confirmation to show the sender.
  """
  message: String!
}

"""
The single write operation this API exposes.
"""
type Mutation {
  """
  Send a message. Try it from the explorer above, or use the contact form on this page.
  """
  sendMessage(input: ContactInput!): SendMessagePayload!
}
